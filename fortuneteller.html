layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Fortune Teller</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IM Fell English', serif;
      background: #050302;
      min-height: 100vh;
    }

    .stage {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2em 1.5em 4em;
    }

    .back-link {
      position: absolute;
      top: 1.5em;
      left: 1.5em;
      font-size: 13px;
      color: #4a3c28;
      text-decoration: none;
      letter-spacing: 0.05em;
      z-index: 20;
    }

    .back-link:hover { color: #8a7350; }

    .wood {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(95deg, #1c130a 0px, #170f08 3px, #1c130a 6px),
        radial-gradient(ellipse at 50% 100%, rgba(80,50,20,0.15) 0%, transparent 60%);
      z-index: 0;
    }

    .shadow-figure {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 240px;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.9) 0%, transparent 70%);
      z-index: 1;
    }

    .dark-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0) 0%, #020100 85%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .prompt {
      margin-top: 1em;
      color: #6b5a3e;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-align: center;
      font-style: italic;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    .candle-row {
      position: relative;
      margin: 2.5em 0 1em;
      height: 60px;
    }

    .candle {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 10px;
      height: 44px;
      background: linear-gradient(180deg,#d8c49a,#9c8458);
    }

    .flame {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 17px;
      background: radial-gradient(ellipse at 50% 75%, #ffcf6e 0%, #d4690f 65%, transparent 100%);
      border-radius: 50%;
      animation: flicker 2.2s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100% { transform: translateX(-50%) scaleY(1) skewX(0deg); opacity: 0.9; }
      35% { transform: translateX(-48%) scaleY(1.15) skewX(2deg); opacity: 1; }
      60% { transform: translateX(-52%) scaleY(0.92) skewX(-2deg); opacity: 0.85; }
    }

    .deal-btn {
      background: #0e0a06;
      border: 1px solid #3a2b18;
      color: #8a7350;
      font-family: 'IM Fell English', serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      padding: 10px 22px;
      cursor: pointer;
      margin-bottom: 2.5em;
      transition: border-color 0.2s, color 0.2s, opacity 0.4s;
    }

    .deal-btn:hover {
      border-color: #6b5230;
      color: #b89868;
    }

    .content.dealt .deal-btn {
      opacity: 0;
      pointer-events: none;
      height: 0;
      margin: 0;
      overflow: hidden;
    }

    .cards {
      position: relative;
      width: 100%;
      height: 200px;
      margin-bottom: 1em;
    }

    .card {
      position: absolute;
      top: 0;
      left: 50%;
      width: 130px;
      height: 188px;
      background: linear-gradient(160deg, #1f150b 0%, #120c06 100%);
      border: 1px solid #4a3520;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 14px rgba(0,0,0,0.6);
      transition: transform 1.4s cubic-bezier(.3,1,.4,1), opacity 1.2s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-1 { transform: translateX(-260%) rotate(-10deg) translateY(10px); opacity: 0; }
    .card-2 { transform: translateX(-50%) translateY(-6px); opacity: 0; }
    .card-3 { transform: translateX(160%) rotate(9deg) translateY(10px); opacity: 0; }

    .content.dealt .card-1 { transform: translateX(-180%) rotate(-7deg); opacity: 1; }
    .content.dealt .card-2 { transform: translateX(-50%) translateY(-14px); opacity: 1; }
    .content.dealt .card-3 { transform: translateX(80%) rotate(6deg); opacity: 1; }

    .card.flipped {
      background: linear-gradient(160deg, #2a1f12 0%, #1a120a 100%);
      border-color: #6b5230;
    }

    .card-sigil svg {
      width: 40px;
      height: 40px;
      opacity: 0.55;
      transition: opacity 0.3s;
    }

    .card.flipped .card-sigil svg { opacity: 0; }

    .card-fortune {
      position: absolute;
      inset: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      color: #b89868;
      line-height: 1.4;
      font-style: italic;
    }

    .card.flipped .card-fortune { display: flex; }

    .hint {
      margin-top: 1.5em;
      font-size: 12px;
      color: #4a3c28;
      letter-spacing: 0.05em;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .content.dealt .hint { opacity: 1; }
  </style>
</head>
<body>
<div class="stage">
  <a href="{{ '/' | absolute_url }}" class="back-link">&larr; back to site</a>
  <div class="wood"></div>
  <div class="shadow-figure"></div>
  <div class="dark-vignette"></div>

  <div class="content" id="content">
    <p class="prompt">&ldquo;three cards. three truths. choose when you are ready.&rdquo;</p>

    <div class="candle-row">
      <div class="candle"><div class="flame"></div></div>
    </div>

    <button class="deal-btn" id="dealBtn" onclick="dealCards()">draw your fortune</button>

    <div class="cards">
      <div class="card card-1" data-fortune="fortune-1" onclick="flipCard(this)">
        <div class="card-sigil"><svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><circle cx="12" cy="12" r="8"/><path d="M12 4v16M4 12h16"/></svg></div>
        <div class="card-fortune">Your fortune will appear here.</div>
      </div>
      <div class="card card-2" data-fortune="fortune-2" onclick="flipCard(this)">
        <div class="card-sigil"><svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg></div>
        <div class="card-fortune">Your fortune will appear here.</div>
      </div>
      <div class="card card-3" data-fortune="fortune-3" onclick="flipCard(this)">
        <div class="card-sigil"><svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><path d="M12 3v18M5 8l7-5 7 5M5 16l7 5 7-5"/></svg></div>
        <div class="card-fortune">Your fortune will appear here.</div>
      </div>
    </div>

    <p class="hint">click a card to turn it over</p>
  </div>
</div>

<script>
  function dealCards() {
    document.getElementById('content').classList.add('dealt');
  }

  function flipCard(card) {
    card.classList.toggle('flipped');
  }
</script>
</body>
</html>
