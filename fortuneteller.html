---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>The Fortune Teller</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'IM Fell English', serif;
      background: #050302;
      font-size: clamp(1em, 2.2vw, 1.3em);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh; /* fixes mobile browser chrome eating vertical space */
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(1em, 4vh, 2em) 1.5em 0;
    }

    .back-link {
      position: absolute;
      top: 1.2em;
      left: 1.2em;
      font-size: clamp(20px, 4vw, 35px);
      color: #4a3c28;
      text-decoration: none;
      letter-spacing: 0.05em;
      z-index: 20;
      touch-action: manipulation;
    }

    .back-link:hover { color: #8a7350; }

    .wood {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(95deg, #1c130a 0px, #170f08 3px, #1c130a 6px),
        radial-gradient(ellipse at 50% 100%, rgba(80,50,20,0.15) 0%, transparent 60%);
      z-index: 0;
    }

    .shadow-figure {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 240px;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.9) 0%, transparent 70%);
      z-index: 1;
    }

    .dark-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0) 0%, #020100 85%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .content.dealt {
      pointer-events: none; /* never let this sit invisibly on top of the cards */
    }

    .prompt {
      margin-top: 1em;
      color: #6b5a3e;
      font-size: clamp(18px, 4.2vw, 35px);
      letter-spacing: 0.06em;
      text-align: center;
      font-style: italic;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    .candle-row {
      position: relative;
      margin: clamp(0.8em, 3vh, 1.5em) 0 1em;
      height: 60px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .candle {
      position: relative;
      width: 10px;
      height: 44px;
      background: linear-gradient(180deg,#d8c49a,#9c8458);
      align-self: flex-end;
    }

    .flame {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 17px;
      background: radial-gradient(ellipse at 50% 75%, #ffcf6e 0%, #d4690f 65%, transparent 100%);
      border-radius: 50%;
      animation: flicker 2.2s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100% { transform: translateX(-50%) scaleY(1) skewX(0deg); opacity: 0.9; }
      35% { transform: translateX(-48%) scaleY(1.15) skewX(2deg); opacity: 1; }
      60% { transform: translateX(-52%) scaleY(0.92) skewX(-2deg); opacity: 0.85; }
    }

    .deal-btn {
      background: #0e0a06;
      border: 1px solid #3a2b18;
      color: #8a7350;
      font-family: 'IM Fell English', serif;
      font-size: clamp(16px, 3.8vw, 35px);
      letter-spacing: 0.08em;
      padding: 0.5em 1em;
      cursor: pointer;
      margin-bottom: clamp(0.8em, 3vh, 1.5em);
      transition: border-color 0.2s, color 0.2s, opacity 0.6s;
      position: relative;
      z-index: 10;
      touch-action: manipulation;
    }

    .deal-btn:hover {
      border-color: #6b5230;
      color: #b89868;
    }

    .content.dealt .deal-btn {
      opacity: 0;
      pointer-events: none;
      height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
      border: none;
    }

    .hint {
      position: fixed;
      bottom: max(1.5em, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(10px, 2.6vw, 14px);
      color: #4a3c28;
      letter-spacing: 0.05em;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease 1s;
      z-index: 20;
      white-space: nowrap;
    }

    .hint.show { opacity: 1; }

    /* TABLE */
    .table-scene {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1200px;
      z-index: 2;
      pointer-events: none;
    }

    .table-img {
      width: 100%;
      display: block;
      filter: brightness(0.7);
    }

    /* CARDS
       --card-w drives every size below via clamp/calc so the whole
       scene scales smoothly at ANY screen size, not just fixed breakpoints. */
    .cards {
      --card-w: clamp(64px, 15vw, 140px);
      --card-h: calc(var(--card-w) * 1.4545);
      position: fixed;
      bottom: clamp(24vh, 40vh, 45vh);
      left: 50%;
      transform: translateX(-50%);
      width: min(85vw, 480px);
      display: flex;
      justify-content: space-around;
      perspective: 1200px;
      z-index: 10;
    }

    .card-wrap {
      width: var(--card-w);
      height: var(--card-h);
    }

    .card {
      width: var(--card-w);
      height: var(--card-h);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.1s cubic-bezier(.4,0,.2,1), opacity 0.8s ease;
      cursor: pointer;
      opacity: 0;
      transform-origin: bottom center;
      touch-action: manipulation;
    }

    .card-1 { transform: rotateX(65deg) rotateZ(-10deg); }
    .card-2 { transform: rotateX(65deg) rotateZ(0deg); }
    .card-3 { transform: rotateX(65deg) rotateZ(10deg); }

    #cards.dealt .card { opacity: 1; }
    #cards.dealt .card-1 { transition-delay: 0.1s; }
    #cards.dealt .card-2 { transition-delay: 0.35s; }
    #cards.dealt .card-3 { transition-delay: 0.6s; }

    /* translateY / translateZ scaled off --card-w (ratios from the
       original 110px-wide desktop design) instead of fixed px per breakpoint */
    .card-1.flipped,
    .card-2.flipped,
    .card-3.flipped {
      transform: rotateX(-5deg)
                 translateY(calc(var(--card-w) * -0.727))
                 translateZ(calc(var(--card-w) * 1.364))
                 rotateY(180deg) !important;
    }

    .card.unchosen {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .card-face, .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 6px;
      border: 1px solid #4a3520;
    }

    .card-back {
      background: linear-gradient(160deg, #1f150b 0%, #120c06 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
    }

    .card-back svg {
      width: clamp(20px, 6.5vw, 36px);
      height: clamp(20px, 6.5vw, 36px);
      opacity: 0.5;
    }

    .card-face {
      background: linear-gradient(160deg, #2a1f12 0%, #1a120a 100%);
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      border-color: #6b5230;
    }

    .card-fortune {
      text-align: center;
      font-size: clamp(8px, 2.4vw, 11px);
      color: #b89868;
      line-height: 1.5;
      font-style: italic;
    }

    /* Shrink vertical rhythm on short viewports (laptops with small
       browser windows, landscape phones) so the deal button never
       gets pushed out of view — there's no scrolling to rescue it. */
    @media (max-height: 560px) {
      .stage { padding-top: 0.6em; }
      .prompt { margin-top: 0.3em; }
      .candle-row { margin: 0.4em 0 0.5em; height: 36px; }
      .candle { height: 28px; }
      .deal-btn { margin-bottom: 0.5em; }
      .cards { bottom: 20vh; }
    }
  </style>
</head>
<body>
<div class="stage">
  <a href="{{ '/' | absolute_url }}" class="back-link">&larr; back to site</a>
  <div class="wood"></div>
  <div class="shadow-figure"></div>
  <div class="dark-vignette"></div>

  <div class="content" id="content">
    <p class="prompt">&ldquo;PICK YOUR CARD.&rdquo;</p>
    <div class="candle-row">
      <div class="candle"><div class="flame"></div></div>
    </div>
    <button class="deal-btn" id="dealBtn" onclick="dealCards()">TRUST THE CARDS.</button>
  </div>
</div>

<div class="table-scene">
  <img src="{{ '/assets/images/table.png' | absolute_url }}" class="table-img" alt="A dark wooden table">
</div>

<div class="cards" id="cards">
  <div class="card-wrap">
    <div class="card card-1" onclick="flipCard(this)">
      <div class="card-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><circle cx="12" cy="12" r="8"/><path d="M12 4v16M4 12h16"/></svg>
      </div>
      <div class="card-face">
        <div class="card-fortune">In the near future you will meet someone very important.</div>
      </div>
    </div>
  </div>
  <div class="card-wrap">
    <div class="card card-2" onclick="flipCard(this)">
      <div class="card-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
      </div>
      <div class="card-face">
        <div class="card-fortune">Consider whether things are really as they seem.</div>
      </div>
    </div>
  </div>
  <div class="card-wrap">
    <div class="card card-3" onclick="flipCard(this)">
      <div class="card-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><path d="M12 3v18M5 8l7-5 7 5M5 16l7 5 7-5"/></svg>
      </div>
      <div class="card-face">
        <div class="card-fortune">Maybe make a nice sandwich.</div>
      </div>
    </div>
  </div>
</div>

<p class="hint" id="hint">TRUST THE CARDS.</p>

<script>
  var chosenCard = null;

  function dealCards() {
    document.getElementById('content').classList.add('dealt');
    document.getElementById('cards').classList.add('dealt');
    document.querySelector('.candle-row').style.display = 'none';
    setTimeout(function() {
      document.querySelectorAll('.card').forEach(function(c) {
        c.style.transitionDelay = '0s';
      });
      document.getElementById('hint').classList.add('show');
    }, 1200);
  }

  function showCheatMessage() {
    var existing = document.getElementById('cheat-msg');
    if (existing) return;
    var msg = document.createElement('div');
    msg.id = 'cheat-msg';
    msg.textContent = 'YOU ONLY HAVE ONE FORTUNE. DO NOT CHEAT.';
    msg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#b89868;font-family:"IM Fell English",serif;font-size:clamp(15px,4vw,22px);letter-spacing:0.1em;text-align:center;z-index:9999;text-shadow:0 0 20px rgba(0,0,0,0.9);pointer-events:none;padding:0 1em;';
    document.body.appendChild(msg);
    setTimeout(function() { msg.remove(); }, 3000);
  }

  function flipCard(card) {
    if (chosenCard && chosenCard !== card) {
      showCheatMessage();
      return;
    }

    if (card.classList.contains('flipped')) {
      card.classList.remove('flipped');
      chosenCard = card;
      document.querySelectorAll('.card').forEach(function(c) {
        if (c !== card) {
          c.classList.add('unchosen');
          c.onclick = function() { showCheatMessage(); };
        }
      });
      setTimeout(function() {
        document.getElementById('hint').classList.add('show');
      }, 400);
    } else {
      chosenCard = card;
      card.classList.add('flipped');
      document.getElementById('hint').classList.remove('show');
      document.querySelectorAll('.card').forEach(function(c) {
        if (c !== card) c.classList.add('unchosen');
      });
    }
  }
</script>
</body>
</html>
