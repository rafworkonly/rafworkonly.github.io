---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Fortune Teller</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'IM Fell English', serif;
      background: #050302;
      font-size: 1.3em;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2em 1.5em 0;
    }

    .back-link {
      position: absolute;
      top: 1.5em;
      left: 1.5em;
      font-size: 35px;
      color: #4a3c28;
      text-decoration: none;
      letter-spacing: 0.05em;
      z-index: 20;
    }

    .back-link:hover { color: #8a7350; }

    .wood {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(95deg, #1c130a 0px, #170f08 3px, #1c130a 6px),
        radial-gradient(ellipse at 50% 100%, rgba(80,50,20,0.15) 0%, transparent 60%);
      z-index: 0;
    }

    .shadow-figure {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 240px;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.9) 0%, transparent 70%);
      z-index: 1;
    }

    .dark-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0) 0%, #020100 85%);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .prompt {
      margin-top: 1em;
      color: #6b5a3e;
      font-size: 35px;
      letter-spacing: 0.06em;
      text-align: center;
      font-style: italic;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    .candle-row {
      position: relative;
      margin: 1.5em 0 1em;
      height: 60px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .candle {
      position: relative;
      width: 10px;
      height: 44px;
      background: linear-gradient(180deg,#d8c49a,#9c8458);
      align-self: flex-end;
    }

    .flame {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 17px;
      background: radial-gradient(ellipse at 50% 75%, #ffcf6e 0%, #d4690f 65%, transparent 100%);
      border-radius: 50%;
      animation: flicker 2.2s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100% { transform: translateX(-50%) scaleY(1) skewX(0deg); opacity: 0.9; }
      35% { transform: translateX(-48%) scaleY(1.15) skewX(2deg); opacity: 1; }
      60% { transform: translateX(-52%) scaleY(0.92) skewX(-2deg); opacity: 0.85; }
    }

    .deal-btn {
      background: #0e0a06;
      border: 1px solid #3a2b18;
      color: #8a7350;
      font-family: 'IM Fell English', serif;
      font-size: 35px;
      letter-spacing: 0.08em;
      padding: 10px 22px;
      cursor: pointer;
      margin-bottom: 1.5em;
      transition: border-color 0.2s, color 0.2s, opacity 0.6s;
      position: relative;
      z-index: 10;
    }

    .deal-btn:hover {
      border-color: #6b5230;
      color: #b89868;
    }

    .content.dealt .deal-btn {
      opacity: 0;
      pointer-events: none;
      height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
      border: none;
    }

    .hint {
      position: fixed;
      bottom: 2em;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #4a3c28;
      letter-spacing: 0.05em;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease 1s;
      z-index: 20;
      white-space: nowrap;
    }

    .hint.show { opacity: 1; }

    /* TABLE */
    .table-scene {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1200px;
      z-index: 2;
      pointer-events: none;
    }

    .table-img {
      width: 100%;
      display: block;
      filter: brightness(0.7);
    }

    /* CARDS */
    .cards {
      position: fixed;
      bottom: 42%;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      max-width: 480px;
      display: flex;
      justify-content: space-around;
      perspective: 1200px;
      z-index: 10;
    }

    .card-wrap {
      width: 110px;
      height: 160px;
    }

    .card {
      width: 110px;
      height: 160px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.1s cubic-bezier(.4,0,.2,1), opacity 0.8s ease;
      cursor: pointer;
      opacity: 0;
    }

    .card-1 { transform: rotateX(65deg) rotateZ(-10deg); }
    .card-2 { transform: rotateX(65deg) rotateZ(0deg); }
    .card-3 { transform: rotateX(65deg) rotateZ(10deg); }

    #cards.dealt .card { opacity: 1; }
    #cards.dealt .card-1 { transition-delay: 0.1s; }
    #cards.dealt .card-2 { transition-delay: 0.35s; }
    #cards.dealt .card-3 { transition-delay: 0.6s; }

    .card-1.flipped { transform: rotateX(-5deg) translateY(-80px) translateZ(150px) rotateY(180deg) !important; }
    .card-2.flipped { transform: rotateX(-5deg) translateY(-80px) translateZ(150px) rotateY(180deg) !important; }
    .card-3.flipped { transform: rotateX(-5deg) translateY(-80px) translateZ(150px) rotateY(180deg) !important; }

    .card.unchosen {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .card-face, .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 6px;
      border: 1px solid #4a3520;
    }

    .card-back {
      background: linear-gradient(160deg, #1f150b 0%, #120c06 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
    }

    .card-back svg {
      width: 36px;
      height: 36px;
      opacity: 0.5;
    }

    .card-face {
      background: linear-gradient(160deg, #2a1f12 0%, #1a120a 100%);
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.7);
      border-color: #6b5230;
    }

    .card-fortune {
      text-align: center;
      font-size: 11px;
      color: #b89868;
      line-height: 1.5;
      font-style: italic;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .cards { width: 80%; bottom: 35%; }
      .card-wrap { width: 90px; height: 130px; }
      .card { width: 90px; height: 130px; }
      .card-back svg { width: 28px; height: 28px; }
      .card-fortune { font-size: 9px; }
      .card-1.flipped,
      .card-2.flipped,
      .card-3.flipped { transform: rotateX(-5deg) translateY(-60px) translateZ(100px) rotateY(180deg) !important; }
    }

    @media (max-width: 480px) {
      body { font-size: 1.05em; }
      .cards { width: 90%; bottom: 28%; }
      .card-wrap { width: 75px; height: 110px; }
      .card { width: 75px; height: 110px; }
      .card-back svg { width: 22px; height: 22px; }
      .card-fortune { font-size: 8px; }
      .prompt { font-size: 22px; padding: 0 1em; }
      .deal-btn { font-size: 22px; }
      .card-1.flipped,
      .card-2.flipped,
      .card-3.flipped { transform: rotateX(-5deg) translateY(-50px) translateZ(80px) rotateY(180deg) !important; }
    }

    @media (min-width: 1400px) {
      .cards { bottom: 45%; max-width: 600px; }
      .card-wrap { width: 140px; height: 200px; }
      .card { width: 140px; height: 200px; }
      .card-fortune { font-size: 13px; }
      .card-1.flipped,
      .card-2.flipped,
      .card-3.flipped { transform: rotateX(-5deg) translateY(-100px) translateZ(200px) rotateY(180deg) !important; }
    }
  </style>
</head>
<body>
<div class="stage">
  <a href="{{ '/' | absolute_url }}" class="back-link">&larr; back to site</a>
  <div class="wood"></div>
  <div class="shadow-figure"></div>
  <div class="dark-vignette"></div>

  <div class="content" id="content">
    <p class="prompt">&ldquo;PICK YOUR CARD.&rdquo;</p>
    <div class="candle-row">
      <div class="candle"><div class="flame"></div></div>
    </div>
    <button class="deal-btn" id="dealBtn" onclick="dealCards()">TRUST THE CARDS.</button>
  </div>
</div>

<div class="table-scene">
  <img src="{{ '/assets/images/table.png' | absolute_url }}" class="table-img" alt="A dark wooden table">
</div>

<div class="cards" id="cards">
  <div class="card-wrap">
    <div class="card card-1" onclick="flipCard(this)">
      <div class="card-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><circle cx="12" cy="12" r="8"/><path d="M12 4v16M4 12h16"/></svg>
      </div>
      <div class="card-face">
        <div class="card-fortune">In the near future you will meet someone very important.</div>
      </div>
    </div>
  </div>
  <div class="card-wrap">
    <div class="card card-2" onclick="flipCard(this)">
      <div class="card-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
      </div>
      <div class="card-face">
        <div class="card-fortune">Consider whether things are really as they seem.</div>
      </div>
    </div>
  </div>
  <div class="card-wrap">
    <div class="card card-3" onclick="flipCard(this)">
      <div class="card-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8a7350" stroke-width="1"><path d="M12 3v18M5 8l7-5 7 5M5 16l7 5 7-5"/></svg>
      </div>
      <div class="card-face">
        <div class="card-fortune">Maybe make a nice sandwich.</div>
      </div>
    </div>
  </div>
</div>

<p class="hint" id="hint">TRUST THE CARDS.</p>

<script>
  var cardChosen = false;

  function dealCards() {
    document.getElementById('content').classList.add('dealt');
    document.getElementById('cards').classList.add('dealt');
    document.querySelector('.candle-row').style.display = 'none';
    setTimeout(function() {
      document.querySelectorAll('.card').forEach(function(c) {
        c.style.transitionDelay = '0s';
      });
      document.getElementById('hint').classList.add('show');
    }, 1200);
  }

  function flipCard(card) {
    if (cardChosen && !card.classList.contains('flipped')) return;

    if (card.classList.contains('flipped')) {
      card.classList.remove('flipped');
      cardChosen = false;
      document.querySelectorAll('.card').forEach(function(c) {
        c.classList.remove('unchosen');
      });
      setTimeout(function() {
        document.getElementById('hint').classList.add('show');
      }, 400);
    } else {
      cardChosen = true;
      card.classList.add('flipped');
      document.getElementById('hint').classList.remove('show');
      document.querySelectorAll('.card').forEach(function(c) {
        if (c !== card) {
          c.classList.add('unchosen');
        }
      });
    }
  }
</script>
</body>
</html>
