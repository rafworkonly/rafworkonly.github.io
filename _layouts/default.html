<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site.title }}{% if page.title and page.title != "" %} &mdash; {{ page.title }}{% endif %}</title>
    {% if site.description %}<meta name="description" content="{{ site.description }}">{% endif %}  
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | absolute_url }}?{{ site.time | date: '%s%N' }}">
    <link rel="apple-touch-icon" href="{{ site.icon }}">
    {%- if jekyll.environment == 'production' and site.google_analytics -%}
      {%- include google-analytics.html -%}
    {%- endif -%}
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:image" content="{{ '/assets/images/preview.png' | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
  </head>
  <body>
    {{ content }}
    {% include menu.html bottom=true %}
    {% unless site.hide_credits %}
      <aside class="site-credits">
        <p>
          <small>Made for sharing our thoughts.</small>
        </p>
      </aside>
    {% endunless %}
    <script>
      var originalTitle = document.title;
      var messages = [
        "/ᐠ｡ꞈ｡ᐟ\",
        "ǝɹɐɥs oʇ ǝɔɐld ∀",
        "(◐ω◑ )",
        "(－_－) zzZ",
        "(=ↀωↀ=)",
        "/ᐠ-ꞈ-ᐟ\",
      ];
      var messageIndex = 0;
      var awayTimer = null;
      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          awayTimer = setInterval(function() {
            document.title = messages[messageIndex % messages.length];
            messageIndex++;
          }, 120000);
        } else {
          clearInterval(awayTimer);
          messageIndex = 0;
          document.title = originalTitle;
        }
      });
    </script>
    <script>
  // Achievement definitions
  var achievements = {
    reader: {
      id: 'reader',
      name: 'What a Nerd!',
      desc: "You've read 5 posts",
      icon: '/assets/images/achievement.png'
    },
    commenter: {
      id: 'commenter',
      name: 'Talkative Guy',
      desc: 'You left your first comment',
      icon: '/assets/images/achievement.png'
    },
    visitor: {
      id: 'visitor',
      name: 'Do you come here often?',
      desc: "You've visited 10 times",
      icon: '/assets/images/achievement.png'
    }
  };

  function showAchievement(achievement) {
    var existing = document.getElementById('achievement-popup');
    if (existing) existing.remove();

    var popup = document.createElement('div');
    popup.id = 'achievement-popup';
    popup.innerHTML = `
      <img src="${achievement.icon}" alt="achievement icon">
      <div>
        <div class="achievement-title">Achievement Unlocked</div>
        <div class="achievement-name">${achievement.name}</div>
        <div class="achievement-desc">${achievement.desc}</div>
      </div>
    `;
    document.body.appendChild(popup);

    setTimeout(function() { popup.classList.add('show'); }, 100);
    setTimeout(function() {
      popup.classList.remove('show');
      setTimeout(function() { popup.remove(); }, 500);
    }, 4000);
  }

  function unlockAchievement(id) {
    var unlocked = JSON.parse(localStorage.getItem('achievements') || '{}');
    if (unlocked[id]) return;
    unlocked[id] = true;
    localStorage.setItem('achievements', JSON.stringify(unlocked));
    showAchievement(achievements[id]);
  }

  // Track visits
  var visits = parseInt(localStorage.getItem('visitCount') || '0') + 1;
  localStorage.setItem('visitCount', visits);
  if (visits >= 10) unlockAchievement('visitor');

  // Track post reads
  if (document.querySelector('.post')) {
    var reads = parseInt(localStorage.getItem('postReads') || '0') + 1;
    localStorage.setItem('postReads', reads);
    if (reads >= 5) unlockAchievement('reader');
  }

  // Track comment attempts
  document.addEventListener('click', function(e) {
    if (e.target.closest('#cusdis_thread')) {
      unlockAchievement('commenter');
    }
  });
</script>
  </body>
</html>
